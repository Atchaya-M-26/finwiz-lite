<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Archive – FinWiz Lite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Nav with back button -->
  <nav class="bg-white shadow p-4">
    <div class="container mx-auto flex items-center">
      <a href="{{ url_for('dashboard') }}" class="text-green-600 hover:underline mr-4">
        ← Back to Dashboard
      </a>
      <h1 class="text-xl font-bold">Archived Statements</h1>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    {% if files %}
      <div class="grid gap-4">
        {% for f in files %}
        <div class="bg-white rounded-xl shadow p-4 border-l-4 border-yellow-400">
          <div class="flex justify-between items-start">
            <div>
              <h3 class="font-semibold text-sm">{{ f.original_name }}</h3>
              <p class="text-xs text-gray-500">
                Archived: {{ f.archived_date.strftime('%Y-%m-%d %H:%M') if f.archived_date else 'Unknown' }}
              </p>
            </div>
            <a href="{{ url_for('view_file', file_id=f._id|string) }}" 
               class="bg-green-600 text-white px-3 py-1 rounded text-xs hover:bg-green-700">
              View
            </a>
          </div>
        </div>
        {% endfor %}
      </div>
    {% else %}
      <div class="text-center py-12">
        <p class="text-gray-500 text-sm">No archived statements yet.</p>
      </div>
    {% endif %}
  </main>
</body>
</html>
