<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinWiz Lite - AI Financial Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent mb-4">
                FinWiz Lite
            </h1>
            <p class="text-xl text-gray-600">AI-powered financial document summarizer</p>
        </div>

        <div class="max-w-4xl mx-auto">
            <!-- Language Selector -->
            <div class="bg-white rounded-2xl shadow-xl p-8 mb-8">
                <form method="POST" enctype="multipart/form-data">
                    <div class="flex flex-col md:flex-row gap-4 items-center justify-center mb-8">
                        <select name="language" class="px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
                            <option value="en">English 🇺🇸</option>
                            <option value="ta">தமிழ் 🇮🇳</option>
                            <option value="hi">हिंदी 🇮🇳</option>
                        </select>
                        <input type="file" name="file" accept=".pdf" class="file-input px-6 py-3 border-2 border-dashed border-gray-300 rounded-xl hover:border-blue-400 transition duration-300 cursor-pointer">
                        <button type="submit" class="bg-gradient-to-r from-blue-500 to-purple-600 text-white px-8 py-3 rounded-xl font-semibold shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300">
                            Analyze PDF
                        </button>
                    </div>
                </form>
            </div>

            {% if summary_en %}
            <!-- Summary Cards -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white rounded-2xl shadow-xl p-8 hover:shadow-2xl transition-all duration-300">
                    <h3 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                        🇺🇸 English
                    </h3>
                    <div class="bg-gray-50 p-6 rounded-xl h-64 overflow-y-auto">
                        {{ summary_en|replace('\n', '<br>')|safe }}
                    </div>
                    <a href="{{ url_for('download_summary', filename=filename, lang='en') }}" 
                       class="block mt-4 bg-green-500 text-white text-center py-3 rounded-xl font-semibold hover:bg-green-600 transition duration-300">
                        📥 Download PDF
                    </a>
                </div>

                <div class="bg-white rounded-2xl shadow-xl p-8 hover:shadow-2xl transition-all duration-300">
                    <h3 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                        🇮🇳 தமிழ்
                    </h3>
                    <div class="bg-gray-50 p-6 rounded-xl h-64 overflow-y-auto">
                        {{ summary_ta|replace('\n', '<br>')|safe }}
                    </div>
                    <a href="{{ url_for('download_summary', filename=filename, lang='ta') }}" 
                       class="block mt-4 bg-green-500 text-white text-center py-3 rounded-xl font-semibold hover:bg-green-600 transition duration-300">
                        📥 Download PDF
                    </a>
                </div>

                <div class="bg-white rounded-2xl shadow-xl p-8 hover:shadow-2xl transition-all duration-300">
                    <h3 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                        🇮🇳 हिंदी
                    </h3>
                    <div class="bg-gray-50 p-6 rounded-xl h-64 overflow-y-auto">
                        {{ summary_hi|replace('\n', '<br>')|safe }}
                    </div>
                    <a href="{{ url_for('download_summary', filename=filename, lang='hi') }}" 
                       class="block mt-4 bg-green-500 text-white text-center py-3 rounded-xl font-semibold hover:bg-green-600 transition duration-300">
                        📥 Download PDF
                    </a>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
